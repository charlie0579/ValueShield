[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --cov=.
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-config=.coveragerc
    -p no:warnings
    -m "not smoke"
markers =
    ut: 单元测试
    sct: 场景集成测试
    smoke: AkShare 真实接口验活（需网络，与 Ollama/大模型无关）。
        手动触发时机：
        1. 修改 magic_formula.py 的 AkShare 接口调用后
        2. 收到「数据为空」用户反馈后
        3. 节假日后首个交易日
        4. 定期健康检查（建议每月一次）
        运行命令：pytest -m smoke tests/smoke/ -v
