[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --cov=.
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-config=.coveragerc
    -p no:warnings
    -m "not smoke"
markers =
    ut: 单元测试
    sct: 场景集成测试
    smoke: 影子数据冒烟测试（需真实网络，手动运行：pytest -m smoke）
