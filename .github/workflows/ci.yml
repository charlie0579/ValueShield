name: CI

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run Unit Tests (UT)
        run: |
          python -m pytest tests/ut/ -v --tb=short \
            --cov=. --cov-report=xml --cov-report=term-missing \
            --cov-config=.coveragerc \
            -p no:warnings \
            --junitxml=reports/ut-results.xml

      - name: Run Scenario Tests (SCT)
        run: |
          python -m pytest tests/sct/ -v --tb=short \
            --cov=. --cov-report=xml --cov-append \
            --cov-config=.coveragerc \
            -p no:warnings \
            --junitxml=reports/sct-results.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: reports/

      - name: Coverage summary
        run: |
          python -m pytest tests/ -v --tb=no --co -q 2>/dev/null | tail -5 || true
          echo "Coverage report generated in htmlcov/"
